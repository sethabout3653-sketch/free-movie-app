<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="redGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E50914" />
      <stop offset="100%" stop-color="#B81D24" />
    </linearGradient>
    <linearGradient id="redGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF1E27" />
      <stop offset="100%" stop-color="#E50914" />
    </linearGradient>
    <linearGradient id="darkRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B81D24" />
      <stop offset="100%" stop-color="#70090D" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background Icon Tile -->
  <rect width="512" height="512" rx="100" fill="#000000"/>
  
  <!-- Subtle border highlight -->
  <rect x="8" y="8" width="496" height="496" rx="92" fill="none" stroke="#222222" stroke-width="4"/>

  <!-- Netflix 'F' Ribbon Design -->
  <g filter="url(#shadow)">
    <!-- Main Vertical Stem -->
    <path d="M136 100 H208 V412 H136 Z" fill="url(#redGrad1)" />

    <!-- Top Horizontal Bar -->
    <path d="M208 100 H376 C376 100 376 168 376 168 H208 V100 Z" fill="url(#redGrad2)" />

    <!-- Top Bar Under-fold Shadow -->
    <path d="M208 100 L240 168 H208 Z" fill="url(#darkRed)" opacity="0.6" />

    <!-- Middle Horizontal Bar -->
    <path d="M208 236 H344 C344 236 344 300 344 300 H208 V236 Z" fill="url(#redGrad2)" />

    <!-- Middle Bar Under-fold Shadow -->
    <path d="M208 236 L236 300 H208 Z" fill="url(#darkRed)" opacity="0.5" />
  </g>
</svg>
